databases:
  - name: mom-course-db
    plan: free

services:
  - type: web
    name: mom-course-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build --workspace server && npm run db:deploy --workspace server
    startCommand: npm run start --workspace server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mom-course-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: AWS_REGION
        value: eu-north-1
      - key: AWS_S3_BUCKET
        value: shoshi-halperin-media-527055790384-eu-north-1-an
      - key: AWS_S3_PUBLIC_URL
        value: https://shoshi-halperin-media-527055790384-eu-north-1-an.s3.eu-north-1.amazonaws.com
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
