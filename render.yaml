databases:
  - name: mom-course-db
    plan: free

services:
  - type: web
    name: mom-course-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace server && npm run db:deploy --workspace server
    startCommand: npm run start --workspace server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mom-course-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
